<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSA Visualizer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= HOME PAGE ================= -->

    <section id="homePage" class="page active">

        <div class="home-container">

            <h1>DSA VISUALIZER</h1>

            <p>
                Learn, Understand and Visualize Data Structures
                with Interactive Operations.
            </p>

            <button onclick="showPage('categoryPage')">
                Get Started
            </button>

        </div>

    </section>


    <!-- ================= CATEGORY PAGE ================= -->

    <section id="categoryPage" class="page">

        <h1 class="title">
            Choose a Category
        </h1>

        <div class="card-container">

            <div class="card">

                <h2>Linear Data Structures</h2>

                <p>
                    Elements are stored sequentially.
                </p>

                <button onclick="openCategory('linear')">
                    Explore
                </button>

            </div>


            <div class="card">

                <h2>Non-Linear Data Structures</h2>

                <p>
                    Elements are stored hierarchically or as networks.
                </p>

                <button onclick="openCategory('nonlinear')">
                    Explore
                </button>

            </div>

        </div>

    </section>


    <!-- ================= DATA STRUCTURE LIST ================= -->

    <section id="listPage" class="page">

        <button class="back-btn"
            onclick="showPage('categoryPage')">

            ← Back

        </button>

        <h1 id="listTitle"></h1>

        <div id="listContainer"
            class="card-container">

        </div>

    </section>


    <!-- ================= VISUALIZER PAGE ================= -->

    <section id="visualizerPage" class="page">

        <button class="back-btn"
            onclick="goBack()">

            ← Back

        </button>

        <h1 id="visualizerTitle"></h1>

        <div id="visualizerPanel">

        </div>

    </section>


    <script src="script.js"></script>

</body>

</html>
